<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pp:#9040E0;--pp2:#B060FF;--ppdark:#4A1890;
  --sl:#C8C8E8;--slhi:#F0EEFF;
  --bg:#0C0C16;--bg2:#111120;--bg3:#16162A;
  --bp:rgba(176,96,255,0.35);--bs:rgba(200,200,232,0.15);
  --txt:#F0EEFF;--muted:#A898C8;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;display:flex;justify-content:center;min-height:100vh;}
.wrap{width:100%;max-width:430px;display:flex;flex-direction:column;overflow:hidden;}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  min-height:280px;
  display:flex;flex-direction:column;
  background:var(--bg2);
}

.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,48,200,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,48,200,0.07) 1px,transparent 1px);
  background-size:36px 36px;
}

/* Diagonal slashes */
.slashes{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.sl{position:absolute;top:-80px;height:180%;transform:skewX(-16deg);}
.sl1{right:52px;width:72px;background:linear-gradient(180deg,var(--pp2) 0%,var(--ppdark) 100%);opacity:0.88;}
.sl2{right:18px;width:16px;background:linear-gradient(180deg,#D0D0E8,#8080A8);opacity:0.55;}
.sl3{right:140px;width:28px;background:linear-gradient(180deg,var(--pp) 0%,transparent 100%);opacity:0.3;}
.sl4{right:178px;width:8px;background:linear-gradient(180deg,#C0C0D8,transparent);opacity:0.18;}

/* Automotive icon pattern */
.auto-icons{position:absolute;inset:0;pointer-events:none;opacity:0.06;}

/* Top: badge + name */
.hero-top{
  position:relative;z-index:3;
  padding:36px 28px 0;
  display:flex;align-items:center;gap:14px;
}
.badge-block{
  width:64px;height:64px;flex-shrink:0;
  background:linear-gradient(145deg,#22104A,#160840);
  border:1.5px solid var(--pp2);
  border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  box-shadow:0 0 0 1px rgba(160,80,232,0.2),inset 0 1px 0 rgba(255,255,255,0.07);
}
.badge-kgm{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:0.08em;line-height:1;
  background:linear-gradient(180deg,#F0F0FF 0%,#9090C0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.badge-sc{font-size:5.5px;letter-spacing:0.2em;color:var(--pp2);font-family:'Rajdhani',sans-serif;font-weight:600;}
.badge-dot{
  position:absolute;top:-4px;right:-4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--pp2);border:2px solid var(--bg2);
}
.hero-title-block{}
.hero-auth{
  font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:0.2em;color:var(--pp2);text-transform:uppercase;margin-bottom:4px;
}
.hero-shopname{
  font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:700;color:#F0EEFF;
  letter-spacing:0.02em;line-height:1.3;
}
.hero-shopname span{color:#FFFFFF;}

/* Name block bottom */
.hero-bottom{
  position:relative;z-index:3;
  margin-top:auto;
  padding:0 28px 36px;
}
.hero-name{
  font-family:'Noto Sans KR',sans-serif;
  font-size:58px;font-weight:900;letter-spacing:0.04em;line-height:1.05;
  background:linear-gradient(180deg,#FFFFFF 0%,#D0C8F8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.hero-role{
  display:flex;align-items:center;gap:10px;
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:500;
  letter-spacing:0.08em;color:#FFFFFF;
}
.hero-role::before{
  content:'';width:28px;height:1.5px;
  background:linear-gradient(90deg,var(--pp2),transparent);
  flex-shrink:0;
}
.hero-code{
  font-family:'Rajdhani',sans-serif;font-size:10px;
  color:rgba(160,80,232,0.7);letter-spacing:0.16em;margin-top:4px;
}

/* ── SERVICE TAGS ── */
.service-strip{
  padding:16px 20px;
  background:var(--bg3);
  border-top:1px solid var(--bp);
  border-bottom:1px solid var(--bp);
  display:flex;gap:12px;
  align-items:center;
  justify-content:center;
}
.cat-btn{
  flex:1;text-align:center;
  font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;
  color:#FFFFFF;letter-spacing:0.06em;
  text-decoration:none;
  padding:12px 0;
  border-radius:10px;
  background:rgba(160,80,255,0.35);
  border:2px solid rgba(255,255,255,0.85);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s, transform 0.1s;
}
.cat-btn:active{
  opacity:0.85;
  transform:scale(0.97);
}
.cat-sep{
  font-size:20px;color:rgba(255,255,255,0.4);
  font-weight:300;flex-shrink:0;
}

/* ── PURPLE BAR ── */
.pbar{height:3px;background:linear-gradient(90deg,var(--ppdark),var(--pp2) 50%,var(--ppdark));}

/* ── QUICK ACTIONS ── */
.qa-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:rgba(160,80,232,0.18);
  border-bottom:1px solid var(--bp);
}
.qa-btn{
  display:flex;flex-direction:column;align-items:center;gap:9px;
  padding:20px 8px;background:var(--bg2);
  text-decoration:none;color:var(--txt);
  transition:background 0.15s;cursor:pointer;border:none;
  font-family:'Noto Sans KR',sans-serif;
  position:relative;overflow:hidden;
}
.qa-btn::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2px;border-radius:2px;
  opacity:0;transition:opacity 0.2s;
}
.qa-btn:nth-child(1)::after{background:var(--pp2);}
.qa-btn:nth-child(2)::after{background:#5080D0;}
.qa-btn:nth-child(3)::after{background:#40A870;}
.qa-btn:active{background:var(--bg3);}
.qa-btn:active::after{opacity:1;}
.qa-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.qa-icon.ph{background:linear-gradient(145deg,#3A1060,#6A20B0);border:1px solid rgba(160,80,232,0.45);}
.qa-icon.wb{background:linear-gradient(145deg,#102040,#204880);border:1px solid rgba(60,120,220,0.35);}
.qa-icon.mp{background:linear-gradient(145deg,#0A2818,#1A5030);border:1px solid rgba(50,180,100,0.35);}
.qa-label{font-size:13px;color:var(--muted);letter-spacing:0.04em;}

/* ── SECTION ── */
.section{
  padding:24px 24px;
  border-bottom:1px solid rgba(176,96,255,0.3);
  background:#1A1628;
  opacity:0;transform:translateY(18px);
  transition:opacity 0.5s ease,transform 0.5s ease;
  position:relative;
}
.section.visible{opacity:1;transform:translateY(0);}
.section::before{
  content:'';position:absolute;left:0;top:12px;bottom:12px;
  width:2px;border-radius:2px;
  background:linear-gradient(180deg,var(--pp2),rgba(160,80,232,0));
}
.sec-label{
  display:flex;align-items:center;gap:8px;
  font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.22em;color:var(--pp2);text-transform:uppercase;
  margin-bottom:14px;
}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--bp),transparent);}

.irow{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(176,96,255,0.15);
}
.irow:last-child{border-bottom:none;}
.iico{
  width:36px;height:36px;flex-shrink:0;border-radius:9px;
  background:rgba(176,96,255,0.2);border:1px solid rgba(176,96,255,0.35);
  display:flex;align-items:center;justify-content:center;
}
.ityp{font-size:10px;font-family:'Rajdhani',sans-serif;letter-spacing:0.14em;color:#9888CC;text-transform:uppercase;font-weight:600;margin-bottom:3px;}
.ival{font-size:16px;color:#F5F0FF;font-weight:500;line-height:1.5;}

/* ── CTA ── */
.cta-area{
  padding:24px 24px 20px;
  display:flex;flex-direction:column;gap:10px;
  background:var(--bg2);
}
.cbtn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:15px 20px;border-radius:10px;
  text-decoration:none;font-size:14px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;letter-spacing:0.03em;
  transition:opacity 0.15s,transform 0.1s;
  cursor:pointer;border:none;width:100%;
  position:relative;overflow:hidden;
}
.cbtn:active{opacity:0.8;transform:scale(0.98);}
.cbtn-shine::before{
  content:'';position:absolute;
  top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transition:left 0.5s;
}
.cbtn:hover.cbtn-shine::before{left:160%;}
.cp{background:linear-gradient(135deg,#4A1490,var(--pp));color:#fff;border:1px solid rgba(160,80,232,0.5);box-shadow:0 4px 24px rgba(124,48,200,0.25),inset 0 1px 0 rgba(255,255,255,0.1);}
.cs{background:linear-gradient(135deg,#1E1E34,#2A2A44);color:var(--slhi);border:1px solid var(--bs);}
.cko{background:linear-gradient(135deg,#2A2010,#3A3010);color:#F0C020;border:1px solid rgba(220,180,20,0.3);}
.cdark{background:transparent;color:var(--muted);border:1px solid rgba(160,80,232,0.18);}

}

/* ── CTA ── */

/* ── FOOTER ── */

  padding:20px 24px 32px;
